<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم صحي</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>

  <header>
    <h1>مطعم صحي</h1>
    <p>صحتك تبدأ من طبقك!</p>
  </header>

  <nav>
    <a href="#about">عن المطعم</a>
    <a href="#meals">الوجبات</a>
    <a href="#contact">تواصل معنا</a>
  </nav>

  <section id="about">
    <h2>عن المطعم</h2>
    <p>نقدم لك خيارات غذائية متوازنة ومغذية تساعدك على الحفاظ على صحتك ونشاطك.</p>
  </section>

  <section id="meals">
    <h2>وجباتنا الصحية</h2>
    <div class="meals">
      <div class="meal" onclick="showMeal('salad')">
        <img src="imgs/Green Salad.png" alt="سلطة خضراء" />
        <h3>سلطة خضراء</h3>
      </div>
      <div class="meal" onclick="showMeal('chicken')">
        <img src="imgs/ramadanrecipe_recipe_779_188528ed865-bb5d-4e62-8e4c-c02ef0d9e52d.jpg" alt="دجاج مشوي" />
        <h3>دجاج مشوي</h3>
      </div>
      <div class="meal" onclick="showMeal('juice')">
        <img src="imgs/671217058-H.jpg" alt="عصير طبيعي" />
        <h3>عصير طبيعي</h3>
      </div>
    </div>
  </section>

  <section id="contact">
    <h2>تواصل معنا</h2>
    <form>
      <input type="text" placeholder="الاسم" required />
      <input type="email" placeholder="البريد الإلكتروني" required />
      <textarea placeholder="رسالتك" rows="5" required></textarea>
      <button type="submit">إرسال</button>
    </form>
  </section>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h3 id="modal-title"></h3>
      <img id="modal-img" src="" alt="" />
      <p id="modal-desc"></p>
    </div>
  </div>

</body>

</html>
