<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>سلة المشتريات</title>
</head>

<body>
    <header>
        <h1>سلة المشتريات</h1>
    </header>

    <section id="cart" class="cart-section">
        <h2>سلة المشتريات</h2>
        <div id="cart-items"></div>
        <p id="cart-empty">سلة المشتريات فارغة</p>
        <button class="btn checkout-btn" onclick="completeOrder()">إتمام الشراء</button>
    </section>

    <div id="purchase-alert" class="purchase-alert">
        <p>تم الشراء بنجاح!</p>
        <button onclick="closeAlert()">موافق</button>
    </div>

    <footer>
        <div class="footer-section">
            <p>جميع الحقوق محفوظة لموقع Zero Phones</p>
            <div class="socials">
                <a href="https://twitter.com/" target="_blank" class="fab fa-twitter"></a>
                <a href="https://facebook.com/" target="_blank" class="fab fa-facebook"></a>
                <a href="https://instagram.com/" target="_blank" class="fab fa-instagram"></a>
            </div>
        </div>
    </footer>

    <script>
        function displayCart() {
            const cartItemsContainer = document.getElementById("cart-items");
            const cartEmptyMessage = document.getElementById("cart-empty");
            const cart = JSON.parse(localStorage.getItem("cart")) || [];

            if (cart.length === 0) {
                cartEmptyMessage.style.display = "block";
                cartItemsContainer.style.display = "none";
            } else {
                cartEmptyMessage.style.display = "none";
                cartItemsContainer.style.display = "block";
                cartItemsContainer.innerHTML = ""; // Clear previous items

                cart.forEach((item) => {
                    const cartItem = document.createElement("div");
                    cartItem.classList.add("cart-item");

                    cartItem.innerHTML = `
                        <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                        <h3>${item.name}</h3>
                        <p>السعر: ${item.price}$</p>
                        <p>الكمية: ${item.quantity}</p>
                        <button class="btn" onclick="removeFromCart('${item.name}')">إزالة</button>
                    `;

                    cartItemsContainer.appendChild(cartItem);
                });
            }
        }

        function removeFromCart(productName) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart = cart.filter((item) => item.name !== productName);
            localStorage.setItem("cart", JSON.stringify(cart));
            displayCart();
        }

        function completeOrder() {
            localStorage.removeItem("cart");
            alert("تم إتمام الشراء بنجاح!");
            displayCart();
        }

        document.addEventListener("DOMContentLoaded", displayCart);
    </script>
</body>

</html>
